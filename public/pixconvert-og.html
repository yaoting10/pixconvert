<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1200, initial-scale=1" />
  <title>PixConvert OG Image</title>
  <style>
    :root {
      --bg: #1c1b1b;
      --green: #065f46;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 1200px;
      height: 630px;
      overflow: hidden;
      background: var(--bg);
      color: var(--green);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .frame {
      position: relative;
      width: 1200px;
      height: 630px;
      padding: 76px 88px 58px;
      background: var(--bg);
    }

    .layout {
      display: grid;
      grid-template-columns: 610px 1fr;
      column-gap: 86px;
      height: 100%;
    }

    .headline {
      align-self: start;
      margin: 0;
      max-width: 610px;
      font-size: 68px;
      line-height: 0.96;
      letter-spacing: 0;
      font-weight: 800;
      color: var(--green);
    }

    .right {
      position: relative;
      align-self: center;
      padding-top: 26px;
    }

    .mark {
      width: 198px;
      height: 198px;
      margin-bottom: 36px;
      opacity: 0.92;
    }

    .copy {
      margin: 0;
      max-width: 354px;
      font-size: 28px;
      line-height: 1.22;
      letter-spacing: 0;
      font-weight: 650;
      color: var(--green);
    }

    .brand {
      position: absolute;
      left: 88px;
      bottom: 58px;
      font-size: 24px;
      line-height: 1;
      letter-spacing: 0;
      font-weight: 750;
      color: var(--green);
    }

    .rule {
      position: absolute;
      left: 88px;
      right: 88px;
      bottom: 104px;
      height: 1px;
      background: var(--green);
      opacity: 0.18;
    }

    .corner {
      position: absolute;
      right: 88px;
      top: 76px;
      width: 54px;
      height: 54px;
      border-top: 2px solid var(--green);
      border-right: 2px solid var(--green);
      opacity: 0.36;
    }
  </style>
</head>
<body>
  <main class="frame" aria-label="PixConvert social preview">
    <div class="corner" aria-hidden="true"></div>
    <div class="layout">
      <h1 class="headline">Convert Images Locally. Nothing Gets Uploaded.</h1>

      <section class="right" aria-label="Product description">
        <svg class="mark" viewBox="0 0 240 240" aria-hidden="true">
          <g fill="none" stroke="#065f46" stroke-width="16" stroke-linecap="round" stroke-linejoin="round">
            <rect x="42" y="42" width="156" height="156" rx="24"/>
            <path d="M86 84h70l-22-22"/>
            <path d="M156 84l-22 22"/>
            <path d="M154 156H84l22 22"/>
            <path d="M84 156l22-22"/>
          </g>
        </svg>
        <p class="copy">Lightning-fast, secure image conversion powered by local WebAssembly. Your files never leave your device.</p>
      </section>
    </div>

    <div class="rule" aria-hidden="true"></div>
    <div class="brand">PixConvert</div>
  </main>
</body>
</html>
